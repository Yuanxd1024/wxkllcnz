name: Export Secrets to TXT

on:
  workflow_dispatch:  # 手动触发，防止意外执行

jobs:
  export:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      WECHAT_WEBHOOK_KEY: ${{ secrets.WECHAT_WEBHOOK_KEY }}
      DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
      PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
      SERVERCHAN_SCKEY: ${{ secrets.SERVERCHAN_SCKEY }}
      SERVERCHAN3_SCKEY: ${{ secrets.SERVERCHAN3_SCKEY }}
      COOLPUSH_SKEY: ${{ secrets.COOLPUSH_SKEY }}
      CUSTOM_WEBHOOK: ${{ secrets.CUSTOM_WEBHOOK }}

    steps:
      - name: Write secrets to file
        run: |
          {
            echo "TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}"
            echo "TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}"
            echo "WECHAT_WEBHOOK_KEY=${WECHAT_WEBHOOK_KEY}"
            echo "DINGTALK_WEBHOOK=${DINGTALK_WEBHOOK}"
            echo "PUSHPLUS_TOKEN=${PUSHPLUS_TOKEN}"
            echo "SERVERCHAN_SCKEY=${SERVERCHAN_SCKEY}"
            echo "SERVERCHAN3_SCKEY=${SERVERCHAN3_SCKEY}"
            echo "COOLPUSH_SKEY=${COOLPUSH_SKEY}"
            echo "CUSTOM_WEBHOOK=${CUSTOM_WEBHOOK}"
          } > secrets.txt

      - name: Upload secrets.txt as artifact
        uses: actions/upload-artifact@v4
        with:
          name: exported-secrets
          path: secrets.txt
          retention-days: 1  # 仅保留1天，降低泄露风险
